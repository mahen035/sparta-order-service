spring.application.name=order-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_service}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Tech@123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.pattern.level=%5p [${spring.application.name},%X{correlationId:-}]

resilience4j.circuitbreaker.instances.productService.sliding-window-size=10
resilience4j.circuitbreaker.instances.productService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.bulkhead.instances.productService.max-concurrent-calls=10
resilience4j.bulkhead.instances.productService.max-wait-duration=0

reconciliation.sweep.enabled=false
reconciliation.sweep.dry-run=true
reconciliation.sweep.fixed-delay=PT5M
reconciliation.sweep.stuck-threshold=PT15M
reconciliation.sweep.max-attempts=5
reconciliation.sweep.batch-size=100

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

eureka.client.service-url.defaultZone=${EUREKA_URI:http://sparta-eureka-server:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true